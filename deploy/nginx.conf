# Nginx 反向代理配置 — 将 80 端口转发到 Bun 3000 端口
# 部署到 /etc/nginx/sites-enabled/food-map 后执行 systemctl restart nginx

server {
    listen 80;
    server_name _;  # 改为你的域名（如果有）

    # 上传的图片
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # API 请求
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态资源 + SPA
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
